name: Build docker image (release)

on:
  release:
    types:
      - published

jobs:
  check-affected:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.extract-app.outputs.app }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Required for proper git history

      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Determine app to build
        id: extract-app
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          if [[ $TAG_NAME == template-* ]]; then
            echo "app=template" >> $GITHUB_OUTPUT
          elif [[ $TAG_NAME == website-* ]]; then
            echo "app=website" >> $GITHUB_OUTPUT
          else
            echo "No matching app found for tag: $TAG_NAME"
            exit 1
          fi

  build-template:
    runs-on: ubuntu-latest
    needs: check-affected
    if: needs.check-affected.outputs.app == 'template'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./apps/${{ needs.check-affected.outputs.app }}
          file: ./apps/${{ needs.check-affected.outputs.app }}/Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/monorepo-apps-${{ needs.check-affected.outputs.app }}:latest
            ${{ vars.DOCKERHUB_USERNAME }}/monorepo-apps-${{ needs.check-affected.outputs.app }}:${{ github.ref_name }}
